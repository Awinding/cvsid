<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="欣瀚資訊">

<title>欣瀚資訊｜CSV 產生器</title>
<style>
  :root {
    --ink: #16232e;
    --ink-soft: #5b6b78;
    --line: #d8dfe5;
    --paper: #f2f4f6;
    --card: #ffffff;
    --accent: #0f6b5c;
    --accent-soft: #e3f1ee;
    --danger: #b3422f;
    --danger-soft: #fbeae6;
    --new: #e8604a;
    --new-soft: #fdece8;
    --mono: "SF Mono", Menlo, Consolas, monospace;
    --toolbar-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: calc(var(--toolbar-h) + 24px + env(safe-area-inset-bottom));
    overscroll-behavior-y: contain;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 14px; }

  /* ---------- 頂部 ---------- */
  .top {
    position: sticky;
    top: 0;
    z-index: 9;
    background: rgba(242,244,246,.94);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding-top: calc(10px + env(safe-area-inset-top));
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 14px 8px;
  }
  h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .04em; }
  h1 .tag {
    font-family: var(--mono);
    font-size: .62rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 4px;
    padding: 2px 7px;
    vertical-align: 2px;
    margin-left: 6px;
    letter-spacing: .08em;
  }
  .stats { font-size: .78rem; color: var(--ink-soft); font-family: var(--mono); white-space: nowrap; }

  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 14px 10px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: .88rem;
    font-family: inherit;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .tab.active { background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 600; }
  .tab .cnt {
    font-family: var(--mono);
    font-size: .68rem;
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    padding: 1px 6px;
    margin-left: 4px;
    vertical-align: 1px;
  }

  /* 子分頁 */
  .subtabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 14px 10px;
  }
  .subtabs::-webkit-scrollbar { display: none; }
  .subtab {
    flex: 1 0 auto;
    border: none;
    background: #e6eaee;
    color: var(--ink-soft);
    font-size: .84rem;
    font-family: inherit;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 9px;
  }
  .subtab.active { background: var(--accent); color: #fff; font-weight: 600; }
  .subtab .cnt { font-family: var(--mono); font-size: .7rem; margin-left: 3px; opacity: .85; }

  /* ---------- 搜尋 ---------- */
  .searchbar { padding: 12px 0 2px; }
  .searchbar input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    padding: 11px 14px;
    font-size: 16px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
  }
  .searchbar input:focus { border-color: var(--accent); }
  .searchbar input::placeholder { color: #b9c2ca; }

  /* ---------- 商品清單 ---------- */
  .subhead {
    font-size: .74rem;
    font-weight: 700;
    letter-spacing: .14em;
    color: var(--ink-soft);
    margin: 18px 2px 8px;
  }
  .items { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .subhead + .items { margin-top: 0; }
  .item {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .item.picked { border-color: var(--accent); background: #f4faf8; }
  .item .info { flex: 1; min-width: 0; }
  .item .name { font-size: .92rem; font-weight: 500; line-height: 1.35; }
  .item .name .badge-new {
    font-size: .62rem;
    font-weight: 700;
    color: var(--new);
    background: var(--new-soft);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 5px;
    vertical-align: 1px;
  }
  .item .code { font-family: var(--mono); font-size: .72rem; color: #9aa7b1; margin-top: 2px; letter-spacing: .04em; }
  .item.picked .code { color: var(--accent); }

  .qtybox { display: flex; align-items: center; gap: 2px; }
  .qbtn {
    width: 42px; height: 42px;
    border: 1px solid var(--line);
    background: #fafbfc;
    color: var(--ink);
    font-size: 1.25rem;
    line-height: 1;
    border-radius: 10px;
    font-family: var(--mono);
    display: flex; align-items: center; justify-content: center;
  }
  .qbtn:active { transform: scale(.93); }
  .qbtn.plus { background: var(--accent); border-color: var(--accent); color: #fff; }
  .qbtn.minus:disabled { opacity: .25; }
  input.qval-input {
    width: 44px;
    border: none;
    background: transparent;
    text-align: center;
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    outline: none;
    -webkit-appearance: none;
    padding: 8px 0;
  }

  .empty-hint {
    text-align: center;
    color: #9aa7b1;
    font-size: .85rem;
    padding: 40px 0;
    line-height: 1.8;
  }

  /* ---------- 手動輸入卡片 ---------- */
  #manualRows { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .row-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .row-card .row-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .row-card .num {
    font-family: var(--mono);
    font-size: .72rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 5px;
    padding: 2px 8px;
    letter-spacing: .06em;
  }
  .btn-del {
    border: none; background: none;
    color: #b9c2ca;
    font-size: 1.05rem; line-height: 1;
    padding: 10px 12px; margin: -10px -12px;
    border-radius: 8px;
  }
  .btn-del:active { color: var(--danger); background: var(--danger-soft); }
  .fields { display: grid; grid-template-columns: 1fr 96px; gap: 8px; }
  .field label { display: block; font-size: .68rem; font-weight: 600; letter-spacing: .1em; color: var(--ink-soft); margin-bottom: 4px; }
  .field label .opt { font-weight: 400; color: #9aa7b1; letter-spacing: 0; }
  .field.note { grid-column: 1 / -1; }
  input.cell {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fafbfc;
    padding: 12px;
    font-size: 16px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
  }
  input.cell.code-input, input.cell.qty { font-family: var(--mono); }
  input.cell:focus { border-color: var(--accent); background: var(--accent-soft); }
  input.cell::placeholder { color: #b9c2ca; }
  input[type=number]::-webkit-inner-spin-button { display: none; }
  .btn-addrow {
    margin-top: 12px;
    width: 100%;
    border: 1px dashed var(--line);
    background: none;
    color: var(--ink-soft);
    font-size: .9rem;
    font-family: inherit;
    padding: 13px;
    border-radius: 12px;
  }
  .btn-addrow:active { border-color: var(--accent); color: var(--accent); }

  /* ---------- 預覽 ---------- */
  .preview-block { margin-top: 24px; }
  .preview-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .preview-head h2 { font-size: .72rem; font-weight: 600; letter-spacing: .14em; color: var(--ink-soft); }
  .preview-head button { border: none; background: none; font-family: var(--mono); font-size: .74rem; color: var(--accent); padding: 8px 0 8px 12px; }
  pre.preview {
    background: #1d2b35;
    color: #cfe6df;
    font-family: var(--mono);
    font-size: .72rem;
    line-height: 1.7;
    border-radius: 12px;
    padding: 14px 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    white-space: pre;
    min-height: 56px;
  }
  pre.preview .hd { color: #7fb8a8; }

  /* ---------- 底部工具列 ---------- */
  .toolbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,.92);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--line);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    z-index: 10;
  }
  .toolbar-inner { display: flex; gap: 8px; max-width: 720px; margin: 0 auto; }
  button.btn {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-size: .9rem;
    font-family: inherit;
    font-weight: 500;
    padding: 12px 4px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    white-space: nowrap;
  }
  button.btn:active { transform: scale(.97); }
  button.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; flex: 1.6; }
  button.btn.icon-only { flex: 0 0 52px; }
  button.btn.icon-only.danger:active { border-color: var(--danger); color: var(--danger); }

  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(var(--toolbar-h) + 20px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(16px);
    background: var(--ink);
    color: #fff;
    font-size: .85rem;
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 20;
    max-width: 86vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 700px) {
    .items { display: grid; grid-template-columns: 1fr 1fr; }
    #manualRows { display: grid; grid-template-columns: 1fr 1fr; }
    h1 { font-size: 1.25rem; }
  }
</style>
</head>

    ['蜜糖波堤','341701','多拿滋'],
    ['雙層巧克力波堤','341811','多拿滋'],
    ['歡樂派對','751704','多拿滋'],
    ['濃醇可可生波堤','661690','多拿滋'],
    ['餅乾可可波堤','680736','多拿滋 2'],
    ['濃熟成紅茶波堤','673384','多拿滋 2'],
    ['白玉歐蕾波堤','673378','多拿滋 2'],
    ['胭脂冷露波堤','673248','多拿滋 2'],
  ],
};

/* ========================================================= */
const HEADERS = ['品號/條碼', '數量', '備註'];
const MAIN_TABS = ['手動輸入', '自用品', '報廢品'];
const SCRAP_SUBS = ['自助區', '關東煮', '多拿滋'];

// 攤平品項
const ITEMS = [];
for (const cat of Object.keys(CATALOG)) {
  CATALOG[cat].forEach((r, i) => {
    ITEMS.push({ uid: `${cat}-${i}`, cat, name: r[0], code: r[1], sub: r[2] || '', isNew: !!r[3] });
  });
}
const qty = {};
let manualData = [];
let activeMain = '報廢品';
let activeSub = SCRAP_SUBS[0];
let searchText = '';

const tabsEl = document.getElementById('tabs');
const subtabsEl = document.getElementById('subtabs');
const contentEl = document.getElementById('content');
const searchbarEl = document.getElementById('searchbar');
const searchInput = document.getElementById('searchInput');
const stats = document.getElementById('stats');
const toast = document.getElementById('toast');
let toastTimer;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

/* ---------- 範圍：目前主分頁包含哪些資料 ---------- */
function scopeRows(main = activeMain) {
  const rows = [];
  if (main === '手動輸入') {
    for (const r of manualData) if (r.code) rows.push({ code: r.code, qty: r.qty || '0', note: r.note });
  } else {
    const cats = main === '自用品' ? ['自用品'] : SCRAP_SUBS;
    for (const it of ITEMS) {
      if (cats.includes(it.cat) && qty[it.uid] > 0) rows.push({ code: it.code, qty: String(qty[it.uid]), note: it.name });
    }
  }
  return rows;
}

/* ---------- 分頁列 ---------- */
function renderTabs() {
  tabsEl.innerHTML = '';
  for (const t of MAIN_TABS) {
    const n = scopeRows(t).length;
    const b = document.createElement('button');
    b.className = 'tab' + (t === activeMain ? ' active' : '');
    b.innerHTML = n ? `${t}<span class="cnt">${n}</span>` : t;
    b.addEventListener('click', () => {
      activeMain = t;
      searchText = ''; searchInput.value = '';
      render();
      window.scrollTo({ top: 0 });
    });
    tabsEl.appendChild(b);
  }
  // 子分頁（僅報廢品）
  if (activeMain === '報廢品') {
    subtabsEl.style.display = '';
    subtabsEl.innerHTML = '';
    for (const s of SCRAP_SUBS) {
      const n = ITEMS.filter(it => it.cat === s && qty[it.uid] > 0).length;
      const b = document.createElement('button');
      b.className = 'subtab' + (s === activeSub ? ' active' : '');
      b.innerHTML = n ? `${s}<span class="cnt">(${n})</span>` : s;
      b.addEventListener('click', () => {
        activeSub = s;
        searchText = ''; searchInput.value = '';
        render();
        window.scrollTo({ top: 0 });
      });
      subtabsEl.appendChild(b);
    }
  } else {
    subtabsEl.style.display = 'none';
  }
}

/* ---------- 商品列 ---------- */
function itemRow(it) {
  const q = qty[it.uid] || 0;
  const div = document.createElement('div');
  div.className = 'item' + (q > 0 ? ' picked' : '');
  div.innerHTML = `
    <div class="info">
      <div class="name">${it.name}${it.isNew ? '<span class="badge-new">新</span>' : ''}</div>
      <div class="code">${it.code}</div>
    </div>
    <div class="qtybox">
      <button class="qbtn minus" ${q === 0 ? 'disabled' : ''}>−</button>
      <input class="qval-input" inputmode="numeric" pattern="[0-9]*" value="${q}" style="color:${q>0?'var(--accent)':'#c2ccd4'}">
      <button class="qbtn plus">＋</button>
    </div>`;
  const inp = div.querySelector('.qval-input');
  div.querySelector('.plus').addEventListener('click', () => setQty(it.uid, q + 1));
  div.querySelector('.minus').addEventListener('click', () => setQty(it.uid, Math.max(0, q - 1)));
  inp.addEventListener('change', () => setQty(it.uid, Math.max(0, parseInt(inp.value, 10) || 0)));
  inp.addEventListener('focus', () => inp.select());
  return div;
}

function setQty(uid, v) {
  if (v > 0) qty[uid] = v; else delete qty[uid];
  render();
}

/* ---------- 渲染 ---------- */
function render() {
  renderTabs();
  updateStats();
  contentEl.innerHTML = '';
  searchbarEl.style.display = activeMain === '手動輸入' ? 'none' : '';

  if (activeMain === '手動輸入') renderManual();
  else if (activeMain === '自用品') renderCatalog('自用品');
  else renderCatalog(activeSub);

  renderPreview();
}

function renderCatalog(cat) {
  const kw = searchText.trim().toLowerCase();
  let list = ITEMS.filter(it => it.cat === cat);
  if (kw) list = list.filter(it => it.name.toLowerCase().includes(kw) || it.code.includes(kw));
  if (!list.length) {
    contentEl.innerHTML = '<div class="empty-hint">找不到符合的品項</div>';
    return;
  }
  let lastSub = null, group = null;
  for (const it of list) {
    if (it.sub !== lastSub) {
      lastSub = it.sub;
      if (it.sub) {
        const h = document.createElement('div');
        h.className = 'subhead';
        h.textContent = it.sub;
        contentEl.appendChild(h);
      }
      group = document.createElement('div');
      group.className = 'items';
      contentEl.appendChild(group);
    }
    group.appendChild(itemRow(it));
  }
}

/* ---------- 手動輸入 ---------- */
function renderManual() {
  const box = document.createElement('div');
  box.id = 'manualRows';
  contentEl.appendChild(box);
  if (!manualData.length) manualData.push({ code: '', qty: '', note: '' });
  manualData.forEach((r, i) => box.appendChild(manualCard(r, i)));

  const add = document.createElement('button');
  add.className = 'btn-addrow';
  add.textContent = '＋ 新增一列';
  add.addEventListener('click', () => {
    manualData.push({ code: '', qty: '', note: '' });
    render();
    const cards = document.querySelectorAll('#manualRows .row-card');
    const last = cards[cards.length - 1];
    last.querySelector('.code-input').focus();
    last.scrollIntoView({ block: 'center', behavior: 'smooth' });
  });
  contentEl.appendChild(add);
}

function manualCard(r, idx) {
  const card = document.createElement('div');
  card.className = 'row-card';
  card.innerHTML = `
    <div class="row-head">
      <span class="num">${String(idx + 1).padStart(2, '0')}</span>
      <button class="btn-del" title="刪除">✕</button>
    </div>
    <div class="fields">
      <div class="field">
        <label>品號/條碼</label>
        <input class="cell code-input" placeholder="輸入或掃描品號、條碼" inputmode="numeric" pattern="[0-9]*" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="next">
      </div>
      <div class="field">
        <label>數量</label>
        <input class="cell qty" type="number" min="0" step="1" inputmode="numeric" pattern="[0-9]*" placeholder="0" enterkeyhint="next">
      </div>
      <div class="field note">
        <label>備註 <span class="opt">選填</span></label>
        <input class="cell note-input" placeholder="—" enterkeyhint="done">
      </div>
    </div>`;
  const codeInp = card.querySelector('.code-input');
  const qtyInp = card.querySelector('.qty');
  const noteInp = card.querySelector('.note-input');
  codeInp.value = r.code; qtyInp.value = r.qty; noteInp.value = r.note;

  codeInp.addEventListener('input', () => { r.code = codeInp.value.trim(); updateStats(); renderTabs(); refreshPreviewOnly(); });
  qtyInp.addEventListener('input', () => { r.qty = qtyInp.value.trim(); updateStats(); refreshPreviewOnly(); });
  noteInp.addEventListener('input', () => { r.note = noteInp.value.trim(); refreshPreviewOnly(); });

  codeInp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); qtyInp.focus(); } });
  qtyInp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); noteInp.focus(); } });
  noteInp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (idx === manualData.length - 1) manualData.push({ code: '', qty: '', note: '' });
      render();
      const cards = document.querySelectorAll('#manualRows .row-card');
      const next = cards[idx + 1];
      if (next) { next.querySelector('.code-input').focus(); next.scrollIntoView({ block: 'center', behavior: 'smooth' }); }
    }
  });

  card.querySelector('.btn-del').addEventListener('click', () => {
    manualData.splice(idx, 1);
    render();
  });
  return card;
}

/* ---------- 預覽 ---------- */
function renderPreview() {
  const rows = scopeRows();
  const pb = document.createElement('div');
  pb.className = 'preview-block';
  pb.innerHTML = `
    <div class="preview-head">
      <h2>${activeMain} · CSV 預覽</h2>
      <button id="btnCopy">複製內容</button>
    </div>
    <pre class="preview" id="preview"></pre>`;
  contentEl.appendChild(pb);
  fillPreview(rows);
  document.getElementById('btnCopy').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(buildCSV()); showToast('已複製 CSV 內容'); }
    catch { showToast('複製失敗，請手動選取'); }
  });
}

function fillPreview(rows) {
  const pre = document.getElementById('preview');
  if (!pre) return;
  const [hd, ...rest] = buildCSV(rows).split('\r\n');
  pre.innerHTML = `<span class="hd">${escapeHtml(hd)}</span>\n` +
    (rest.length ? rest.map(escapeHtml).join('\n') : '<span style="color:#5f7a72">（本頁尚無資料）</span>');
}
function refreshPreviewOnly() { fillPreview(scopeRows()); }

/* ---------- 統計 / CSV ---------- */
function updateStats() {
  const rows = scopeRows();
  const total = rows.reduce((s, r) => s + (parseInt(r.qty, 10) || 0), 0);
  stats.textContent = `${activeMain} ${rows.length} 品項 · 總數 ${total}`;
}

const csvField = v => /[",\r\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
const escapeHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

function buildCSV(rows = scopeRows()) {
  const lines = [HEADERS.join(',')];
  for (const r of rows) lines.push([csvField(r.code), csvField(r.qty || '0'), csvField(r.note)].join(','));
  return lines.join('\r\n');
}

/* ---------- 搜尋 ---------- */
searchInput.addEventListener('input', () => { searchText = searchInput.value; render(); searchInput.focus(); });

/* ---------- 匯出：依所在分頁輸出，檔名 = 年月日時分 + 分頁名 ---------- */
function timestamp() {
  const d = new Date(); // 裝置本地時間
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
}

document.getElementById('btnExport').addEventListener('click', async () => {
  const rows = scopeRows();
  if (!rows.length) { showToast(`「${activeMain}」尚無資料可匯出`); return; }
  const name = `${timestamp()}${activeMain}.csv`;   // 例：202607131211報廢品.csv
  const bom = '\uFEFF';
  const blob = new Blob([bom + buildCSV(rows)], { type: 'text/csv' });
  const file = new File([blob], name, { type: 'text/csv' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: name });
      showToast(`已匯出 ${name}`);
      return;
    } catch (err) { if (err.name === 'AbortError') return; }
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
  showToast(`已匯出 ${name}`);
});

/* ---------- 匯入 ---------- */
const fileInput = document.getElementById('fileInput');
document.getElementById('btnImport').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    const records = parseCSV(String(reader.result).replace(/^\uFEFF/, ''));
    if (!records.length) { showToast('檔案沒有可讀取的資料'); return; }
    let start = 0;
    const h0 = (records[0][0] || '').trim().toLowerCase();
    if (['品號', '品號/條碼', '條碼', 'code', 'barcode', 'item'].includes(h0)) start = 1;

    let matched = 0, manualCnt = 0;
    for (let i = start; i < records.length; i++) {
      const [code = '', q = '', note = ''] = records[i].map(x => x.trim());
      if (!code) continue;
      const n = parseInt(q, 10) || 0;
      let it = ITEMS.find(x => x.code === code && x.name === note);
      if (!it) it = ITEMS.find(x => x.code === code);
      if (it && n > 0) { qty[it.uid] = (qty[it.uid] || 0) + n; matched++; }
      else { manualData.push({ code, qty: q, note }); manualCnt++; }
    }
    render();
    showToast(`已匯入：目錄 ${matched} 項${manualCnt ? `、手動 ${manualCnt} 項` : ''}`);
  };
  reader.readAsText(f, 'utf-8');
  fileInput.value = '';
});

function parseCSV(text) {
  const records = [];
  let field = '', record = [], inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { record.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i + 1] === '\n') i++;
        record.push(field); field = '';
        if (record.some(x => x !== '')) records.push(record);
        record = [];
      } else field += c;
    }
  }
  record.push(field);
  if (record.some(x => x !== '')) records.push(record);
  return records;
}

/* ---------- 清空（僅清目前分頁） ---------- */
document.getElementById('btnClear').addEventListener('click', () => {
  const rows = scopeRows();
  if (rows.length && !confirm(`確定要清空「${activeMain}」的資料？`)) return;
  if (activeMain === '手動輸入') {
    manualData = [];
  } else {
    const cats = activeMain === '自用品' ? ['自用品'] : SCRAP_SUBS;
    for (const it of ITEMS) if (cats.includes(it.cat)) delete qty[it.uid];
  }
  render();
  showToast(`已清空「${activeMain}」`);
});

render();
</script>
